<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProceduralAdventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(1200px 700px at 50% -20%, #1a2740 0%, #0a0a12 55%);
      color: #d8deea;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 1rem;
      overflow: hidden;
    }

    #topbar {
      width: min(96vw, 1320px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      user-select: none;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #eef4ff;
    }

    #canvas-container {
      position: relative;
      border: 1px solid #2a3552;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 14px 60px rgba(0, 0, 0, 0.55), inset 0 0 0 1px rgba(90, 120, 180, 0.15);
      width: min(96vw, 1320px);
      aspect-ratio: 16 / 9;
      background: #070a13;
    }

    canvas.emscripten {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0a12;
      outline: none;
    }

    #status-bar {
      width: min(96vw, 1320px);
      margin-top: 0.45rem;
      font-size: 0.85rem;
      color: #98a3b8;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }

    /* Loading overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 12, 22, 0.95), rgba(10, 12, 18, 0.98));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-text {
      font-size: 0.9rem;
      color: #a8b4cf;
      margin-bottom: 1rem;
    }

    #progress-bar-outer {
      width: 300px;
      max-width: 70vw;
      height: 6px;
      background: #151b2e;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4368ce, #69b0ff);
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    .btnrow {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    button {
      border: 1px solid #314469;
      background: linear-gradient(180deg, #1a2842, #152138);
      color: #dfe8fb;
      border-radius: 6px;
      padding: 0.35rem 0.65rem;
      font-size: 0.78rem;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover { border-color: #4d6aa5; }
    button:active { transform: translateY(1px); }

    #hint {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>Procedural Adventure (Web)</h1>
    <div class="btnrow">
      <button id="focus-btn" type="button">Focus</button>
      <button id="fs-btn" type="button">Fullscreen</button>
    </div>
  </div>

  <div id="canvas-container">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="0" width="1280" height="720"></canvas>
    <div id="loading-overlay">
      <div id="loading-text">Preparing world...</div>
      <div id="progress-bar-outer">
        <div id="progress-bar-inner"></div>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-text">Booting...</span>
    <span id="hint">WASD / Arrows to move, 1-2-3 for stances</span>
  </div>

  <script>
    const statusEl = document.getElementById('status-text');
    const progressInner = document.getElementById('progress-bar-inner');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const canvas = document.getElementById('canvas');
    const container = document.getElementById('canvas-container');
    const focusBtn = document.getElementById('focus-btn');
    const fsBtn = document.getElementById('fs-btn');
    let runtimeReady = false;
    let resizeRaf = 0;

    function syncCanvasSize() {
      resizeRaf = 0;
      const rect = container.getBoundingClientRect();
      // Keep canvas backing size in CSS pixels to preserve mouse/input alignment.
      const targetW = Math.max(320, Math.round(rect.width));
      const targetH = Math.max(180, Math.round(rect.height));
      if (runtimeReady && typeof Module.setCanvasSize === 'function') {
        Module.setCanvasSize(targetW, targetH);
      } else if (canvas.width !== targetW || canvas.height !== targetH) {
        canvas.width = targetW;
        canvas.height = targetH;
      }
    }

    function scheduleCanvasSync() {
      if (resizeRaf) return;
      resizeRaf = requestAnimationFrame(syncCanvasSize);
    }

    function setLoadingDone() {
      loadingOverlay.classList.add('hidden');
      statusEl.textContent = 'Ready';
      scheduleCanvasSync();
      canvas.focus();
    }

    function requestFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        container.requestFullscreen().catch(() => {});
      }
    }

    focusBtn.addEventListener('click', () => canvas.focus());
    fsBtn.addEventListener('click', requestFullscreen);
    canvas.addEventListener('click', () => canvas.focus());
    window.addEventListener('resize', scheduleCanvasSync);
    document.addEventListener('fullscreenchange', scheduleCanvasSync);

    // Prevent arrow/space keys from scrolling page while playing.
    window.addEventListener('keydown', (ev) => {
      const blockKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '];
      if (blockKeys.includes(ev.key)) ev.preventDefault();
    }, { passive: false });

    var Module = {
      canvas: canvas,
      setStatus: function(text) {
        statusEl.textContent = text;
        // Parse progress from text like "Downloading data... (X/Y)"
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          var pct = (parseFloat(m[2]) / parseFloat(m[4])) * 100;
          progressInner.style.width = pct + '%';
          loadingText.textContent = m[1].trim() + ' ' + Math.floor(pct) + '%';
        } else if (text) {
          loadingText.textContent = text;
        }
        if (text === '') {
          setLoadingDone();
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        if (left === 0) {
          Module.setStatus('');
        } else {
          Module.setStatus('Loading... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')');
        }
      },
      onRuntimeInitialized: function() {
        runtimeReady = true;
        scheduleCanvasSync();
        Module.setStatus('');
      },
      preRun: [function() {
        scheduleCanvasSync();
      }],
      printErr: function(text) {
        console.error(text);
      }
    };

    Module.setStatus('Loading...');

    window.onerror = function(msg) {
      console.error('window.onerror:', msg);
      Module.setStatus('Error — see browser console');
      loadingText.textContent = 'Error loading — check console';
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
